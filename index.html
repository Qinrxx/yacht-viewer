<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3D Motor Yacht Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #001a33; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #controls-overlay {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0, 10, 30, 0.72); border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(10px); border-radius: 14px; padding: 12px 28px;
      display: flex; gap: 28px; align-items: center; color: rgba(255,255,255,0.85);
      font-size: 13px; pointer-events: none; user-select: none;
    }
    .ctrl { display: flex; align-items: center; gap: 8px; }
    .ctrl-key {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
      border-radius: 6px; padding: 3px 9px; font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    }
    .divider { width: 1px; height: 22px; background: rgba(255,255,255,0.18); }
    #title-badge { position: fixed; top: 20px; left: 24px; color: white; pointer-events: none; }
    #title-badge h1 { font-size: 18px; font-weight: 700; letter-spacing: 1px; text-shadow: 0 2px 12px rgba(0,0,0,0.6); }
    #title-badge p { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  </style>
</head>
<body>
<div id="title-badge"><h1>&#x2693; MOTOR YACHT</h1><p>3D Interactive Viewer</p></div>
<div id="controls-overlay">
  <div class="ctrl"><span class="ctrl-key">Left Drag</span> Rotate</div>
  <div class="divider"></div>
  <div class="ctrl"><span class="ctrl-key">Right Drag</span> Pan</div>
  <div class="divider"></div>
  <div class="ctrl"><span class="ctrl-key">Scroll</span> Zoom</div>
</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);
scene.fog = new THREE.FogExp2(0x87CEEB, 0.012);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);
const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(18, 8, 22);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.minDistance = 8; controls.maxDistance = 80;
controls.maxPolarAngle = Math.PI / 2 - 0.04;
controls.target.set(0, 1.5, 0); controls.update();
const ambient = new THREE.AmbientLight(0xffeedd, 0.6); scene.add(ambient);
const sun = new THREE.DirectionalLight(0xfff5e0, 2.2);
sun.position.set(40, 60, 30); sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 200;
sun.shadow.camera.left = -40; sun.shadow.camera.right = 40;
sun.shadow.camera.top = 40; sun.shadow.camera.bottom = -40;
sun.shadow.bias = -0.001; scene.add(sun);
const fill = new THREE.DirectionalLight(0x88aacc, 0.5);
fill.position.set(-20, 10, -20); scene.add(fill);
const hemi = new THREE.HemisphereLight(0x87CEEB, 0x1a5276, 0.4); scene.add(hemi);
const hullMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.3, metalness: 0.15 });
const hullBlueMat = new THREE.MeshStandardMaterial({ color: 0x1a3a5c, roughness: 0.5, metalness: 0.1 });
const deckMat = new THREE.MeshStandardMaterial({ color: 0xe8dcc8, roughness: 0.8, metalness: 0.0 });
const cabinMat = new THREE.MeshStandardMaterial({ color: 0xfafafa, roughness: 0.25, metalness: 0.2 });
const windowMat = new THREE.MeshStandardMaterial({ color: 0x1a2a3a, roughness: 0.05, metalness: 0.8, transparent: true, opacity: 0.85 });
const railMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.2, metalness: 0.9 });
const chromeMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, roughness: 0.05, metalness: 1.0 });
const blackMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.6, metalness: 0.1 });
const redMat = new THREE.MeshStandardMaterial({ color: 0xcc2200, roughness: 0.4, metalness: 0.1 });
const yacht = new THREE.Group(); scene.add(yacht);
function mesh(geo, mat, rx=0, ry=0, rz=0, x=0, y=0, z=0) {
  const m = new THREE.Mesh(geo, mat);
  m.rotation.set(rx, ry, rz); m.position.set(x, y, z);
  m.castShadow = true; m.receiveShadow = true; return m;
}
yacht.add(mesh(new THREE.BoxGeometry(14, 2.2, 4.2), hullMat));
yacht.add(mesh(new THREE.BoxGeometry(14, 0.25, 4.22), hullBlueMat, 0,0,0, 0,0.6,0));
yacht.add(mesh(new THREE.BoxGeometry(13.5, 0.5, 3.8), hullBlueMat, 0,0,0, 0,-1.25,0));
const bow = new THREE.Mesh(new THREE.CylinderGeometry(0, 2.1, 3.5, 4, 1), hullMat);
bow.rotation.set(0, Math.PI/4, Math.PI/2); bow.position.set(8.0, 0.1, 0); bow.castShadow=true; yacht.add(bow);
const bowA = new THREE.Mesh(new THREE.CylinderGeometry(0, 2.12, 3.52, 4, 1), hullBlueMat);
bowA.rotation.set(0, Math.PI/4, Math.PI/2); bowA.position.set(8.0, -0.6, 0); bowA.castShadow=true; yacht.add(bowA);
yacht.add(mesh(new THREE.BoxGeometry(0.3, 2.0, 4.2), hullBlueMat, 0,0,0, -7.15,0,0));
yacht.add(mesh(new THREE.BoxGeometry(14, 0.2, 4.0), deckMat, 0,0,0, 0,1.2,0));
yacht.add(mesh(new THREE.BoxGeometry(4.5, 0.18, 3.8), deckMat, 0,0,0, 4.75,1.22,0));
yacht.add(mesh(new THREE.BoxGeometry(2.5, 0.18, 4.0), deckMat, 0,0,0, -7.75,0.1,0));
yacht.add(mesh(new THREE.BoxGeometry(6.5, 2.4, 3.6), cabinMat, 0,0,0, 0.3,2.5,0));
yacht.add(mesh(new THREE.BoxGeometry(6.6, 0.18, 3.65), cabinMat, 0,0,0, 0.3,3.72,0));
yacht.add(mesh(new THREE.BoxGeometry(0.15, 2.0, 3.5), windowMat, 0,0,-0.18, 3.62,2.6,0));
yacht.add(mesh(new THREE.BoxGeometry(4.0, 0.8, 0.1), windowMat, 0,0,0, 0.3,2.7,1.86));
yacht.add(mesh(new THREE.BoxGeometry(4.0, 0.8, 0.1), windowMat, 0,0,0, 0.3,2.7,-1.86));
yacht.add(mesh(new THREE.BoxGeometry(0.1, 0.7, 2.6), windowMat, 0,0,0, 3.6,2.55,0));
yacht.add(mesh(new THREE.BoxGeometry(0.1, 0.7, 2.8), windowMat, 0,0,0, -2.95,2.55,0));
yacht.add(mesh(new THREE.BoxGeometry(5.0, 0.2, 3.2), deckMat, 0,0,0, 0.1,3.92,0));
yacht.add(mesh(new THREE.BoxGeometry(2.8, 1.0, 3.1), cabinMat, 0,0,0, 0.8,4.55,0));
yacht.add(mesh(new THREE.BoxGeometry(0.6, 0.7, 2.2), blackMat, 0,0,0, 1.5,4.45,0));
yacht.add(mesh(new THREE.TorusGeometry(0.28, 0.025, 8, 24), chromeMat, Math.PI/2-0.4,0,0, 1.86,4.72,0.4));
yacht.add(mesh(new THREE.BoxGeometry(5.1, 0.15, 3.25), cabinMat, 0,0,0, 0.1,5.08,0));
yacht.add(mesh(new THREE.CylinderGeometry(0.05, 0.07, 4.5, 8), chromeMat, 0,0,0, -0.3,7.3,0));
const radar = mesh(new THREE.CylinderGeometry(0.4, 0.35, 0.18, 12), blackMat, 0,0,0, -0.3,9.6,0);
yacht.add(radar);
const arch = mesh(new THREE.TorusGeometry(1.55, 0.05, 6, 20, Math.PI), chromeMat, 0,0,0, -0.5,5.25,0);
arch.rotation.y = Math.PI/2; yacht.add(arch);
function addRail(x,y,z,len,axis) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,len,6), railMat);
  if(axis==='x') m.rotation.z=Math.PI/2; if(axis==='z') m.rotation.x=Math.PI/2;
  m.position.set(x,y,z); m.castShadow=true; yacht.add(m);
}
function addPost(x,y,z) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,0.8,6), railMat);
  m.position.set(x,y,z); yacht.add(m);
}
addRail(0,1.75,2.1,14,'x'); addRail(-5.5,1.75,-2.1,3,'x');
for(let x=-6.5;x<=6.5;x+=2){addPost(x,1.35,2.1);addPost(x,1.35,-2.1);}
addRail(4.5,1.75,0,3.8,'z'); addRail(-5.5,1.75,0,3.8,'z');
addRail(0.1,4.1,1.7,5.0,'x'); addRail(0.1,4.1,-1.7,5.0,'x');
function addCleat(x,z){
  const m=new THREE.Mesh(new THREE.BoxGeometry(0.3,0.08,0.12),chromeMat);
  m.position.set(x,1.32,z); yacht.add(m);
}
addCleat(6,1.9);addCleat(6,-1.9);addCleat(-6,1.9);addCleat(-6,-1.9);addCleat(0,1.9);addCleat(0,-1.9);
function addFender(x,z){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.9,10),new THREE.MeshStandardMaterial({color:0xfafafa,roughness:0.5}));
  m.rotation.x=Math.PI/2; m.position.set(x,0.2,z); yacht.add(m);
}
addFender(-3,2.3);addFender(1,2.3);addFender(-3,-2.3);addFender(1,-2.3);
function addExhaust(z){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,0.4,10),blackMat);
  m.position.set(-6.9,0.0,z); yacht.add(m);
}
addExhaust(0.9);addExhaust(-0.9);
yacht.add(mesh(new THREE.CylinderGeometry(0.08,0.08,0.5,8),chromeMat,0,0,0,7.2,1.15,0));
yacht.add(mesh(new THREE.BoxGeometry(1.8,0.3,1.1),redMat,0,0,0,-7.5,0.35,0));
const waterGeo = new THREE.PlaneGeometry(400,400,60,60);
const waterMat = new THREE.MeshStandardMaterial({color:0x006994,roughness:0.1,metalness:0.25,transparent:true,opacity:0.88});
const water = new THREE.Mesh(waterGeo, waterMat);
water.rotation.x=-Math.PI/2; water.position.y=-1.12; water.receiveShadow=true; scene.add(water);
const wp=waterGeo.attributes.position;
for(let i=0;i<wp.count;i++){wp.setZ(i,Math.sin(wp.getX(i)*0.18)*0.22+Math.cos(wp.getY(i)*0.14)*0.18);}
waterGeo.computeVertexNormals();
const sky=new THREE.Mesh(new THREE.SphereGeometry(300,16,10),new THREE.MeshBasicMaterial({color:0x4fa8d5,side:THREE.BackSide}));
scene.add(sky);
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  yacht.position.y=Math.sin(t*0.6)*0.12+Math.sin(t*1.1)*0.05;
  yacht.rotation.z=Math.sin(t*0.5)*0.018+Math.sin(t*0.9)*0.008;
  yacht.rotation.x=Math.sin(t*0.45)*0.010;
  waterMat.color.setHSL(0.56,0.65,0.28+Math.sin(t*0.3)*0.02);
  radar.rotation.y=t*1.2;
  controls.update(); renderer.render(scene,camera);
}
animate();
</script>
</body>
</html>
